<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Absensi ND</title>

<style>
:root{
  --yellow:#f7c600;
  --ly:#fff2cc;
  --border:#000;
}

body{
  font-family: Calibri, Arial, sans-serif;
  margin:8px;
  background:#fff;
}

/* ===== FILTER ===== */
.filter{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
  margin-bottom:10px;
}
select,button{
  padding:6px 10px;
  font-size:13px;
}

/* ===== TABLE WRAP ===== */
.table-wrap{
  width:100%;
  overflow:auto;
  border:1px solid #aaa;
}

/* ===== TABLE ===== */
table{
  border-collapse:collapse;
  min-width:1600px;
  width:100%;
}
th,td{
  border:1px solid var(--border);
  font-size:11px;
  text-align:center;
  padding:2px;
  height:26px;
  background:#fff;
}

/* ===== TITLE ===== */
.title{
  background:var(--yellow);
  font-size:16px;
  font-weight:bold;
}
.subtitle{
  background:var(--ly);
  font-weight:bold;
}

/* ===== STICKY HEADER ===== */
thead th{
  position:sticky;
  top:0;
  z-index:4;
}

/* ===== STICKY LEFT ===== */
.sticky{
  position:sticky;
  left:0;
  z-index:5;
  background:#fff;
}
.sticky2{
  position:sticky;
  left:170px;
  z-index:5;
  background:#fff;
}

/* ===== NAME ===== */
.nama{
  min-width:170px;
  text-align:left;
  padding-left:6px;
  font-weight:bold;
}
.jabatan{
  min-width:130px;
  text-align:left;
  padding-left:6px;
}

/* ===== MINGGU ===== */
.minggu{
  background:red;
  color:white;
  font-weight:bold;
  writing-mode:vertical-rl;
  transform:rotate(180deg);
  width:20px;
}

@media print{
  .filter{display:none}
  .table-wrap{overflow:visible}
}
</style>
</head>

<body>

<!-- FILTER -->
<div class="filter">
  Bulan:
  <select id="bulan"></select>

  Tahun:
  <select id="tahun"></select>

  Nama:
  <select id="filterNama"></select>

  Jabatan:
  <select id="filterDept"></select>

  <button onclick="window.print()">Print / PDF</button>
</div>

<div class="table-wrap">
<table>
<thead>
<tr><th class="title" colspan="100">ABSENSI ND</th></tr>
<tr><th class="subtitle" colspan="100" id="periode"></th></tr>

<tr>
  <th class="sticky" rowspan="2">Nama</th>
  <th class="sticky2" rowspan="2">Departemen</th>
  <th id="colTanggal" colspan="31">Tanggal</th>
</tr>
<tr id="headTanggal"></tr>
</thead>

<tbody id="body"></tbody>
</table>
</div>

<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQzl6jOLHAiwYux6qEl-4SfBLWvAiqA5PDEoSLAK6KrqRye_ecMT7o6mTBbCKt41g/pub?gid=30156212&single=true&output=csv";

/* ===== GLOBAL ===== */
let rawData = [];

/* ===== INIT FILTER ===== */
const bulanEl = document.getElementById("bulan");
const tahunEl = document.getElementById("tahun");
const namaEl  = document.getElementById("filterNama");
const deptEl  = document.getElementById("filterDept");

const namaBulan = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
namaBulan.forEach((b,i)=>bulanEl.innerHTML+=`<option value="${i}">${b}</option>`);
bulanEl.value = new Date().getMonth();

for(let y=2024;y<=2027;y++){
  tahunEl.innerHTML += `<option value="${y}">${y}</option>`;
}
tahunEl.value = new Date().getFullYear();

bulanEl.onchange = tahunEl.onchange = namaEl.onchange = deptEl.onchange = render;

/* ===== FETCH DATA ===== */
fetch(CSV_URL)
.then(r=>r.text())
.then(csv=>{
  const rows = csv.trim().split("\n");
  const head = rows.shift().split(",");

  rawData = rows.map(r=>{
    const c = r.split(",");
    return {
      nama: c[head.indexOf("Nama")],
      dept: c[head.indexOf("Departemen")],
      tanggal: new Date(c[head.indexOf("Tanggal")]),
      jam: (c[head.indexOf("Scan Masuk")] || "").trim()
    };
  });

  initFilter();
  render();
});

/* ===== INIT FILTER OPTION ===== */
function initFilter(){
  namaEl.innerHTML = "<option value=''>Semua</option>" +
    [...new Set(rawData.map(d=>d.nama))].sort()
      .map(n=>`<option>${n}</option>`).join("");

  deptEl.innerHTML = "<option value=''>Semua</option>" +
    [...new Set(rawData.map(d=>d.dept))].sort()
      .map(j=>`<option>${j}</option>`).join("");
}

/* ===== RENDER ===== */
function render(){
  const bulan = parseInt(bulanEl.value);
  const tahun = parseInt(tahunEl.value);
  const fNama = namaEl.value;
  const fDept = deptEl.value;

  const hariMax = new Date(tahun, bulan+1, 0).getDate();
  document.getElementById("periode").textContent =
    `PERIODE ${namaBulan[bulan].toUpperCase()} ${tahun}`;

  /* HEADER TANGGAL */
  let ht = "";
  for(let d=1; d<=hariMax; d++){
    const day = new Date(tahun, bulan, d).getDay();
    ht += day===0 ? `<th class="minggu">M</th>` : `<th>${d}</th>`;
  }
  document.getElementById("headTanggal").innerHTML = ht;
  document.getElementById("colTanggal").colSpan = hariMax;

  /* FILTER DATA MENTAH */
  const filtered = rawData.filter(r=>{
    return r.tanggal.getMonth()===bulan &&
           r.tanggal.getFullYear()===tahun &&
           (!fNama || r.nama===fNama) &&
           (!fDept || r.dept===fDept);
  });

  /* GROUP BY NAMA + DEPT */
  const group = {};
  filtered.forEach(r=>{
    const key = r.nama+"||"+r.dept;
    if(!group[key]){
      group[key] = {nama:r.nama, dept:r.dept, hari:{}};
    }
    const tgl = r.tanggal.getDate();  // ✅ KUNCI PERBAIKAN
    if(r.jam) group[key].hari[tgl] = r.jam;
  });

  /* RENDER BODY */
  const body = document.getElementById("body");
  body.innerHTML = "";

  Object.values(group).forEach(emp=>{
    let tr = `<tr>
      <td class="sticky nama">${emp.nama}</td>
      <td class="sticky2 jabatan">${emp.dept}</td>`;

    for(let d=1; d<=hariMax; d++){
      tr += `<td>${emp.hari[d] || ""}</td>`;
    }

    tr += "</tr>";
    body.innerHTML += tr;
  });
}
</script>

</body>
</html>
``
