<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi ND</title>

<style>
body{
  font-family: Calibri, Arial, sans-serif;
  margin: 8px;
}

/* FILTER */
.filter{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:10px;
}
select,button{
  padding:5px 8px;
  font-size:13px;
}

/* TABLE WRAP */
.table-wrap{
  width:100%;
  overflow:auto;
  border:1px solid #aaa;
}

/* TABLE */
table{
  border-collapse:collapse;
  min-width:1600px;
  width:100%;
}
th,td{
  border:1px solid #000;
  font-size:11px;
  text-align:center;
  padding:2px;
  height:26px;
}

/* TITLE */
.title{
  background:#f7c600;
  font-size:16px;
  font-weight:bold;
}
.subtitle{
  background:#fff2cc;
  font-weight:bold;
}

/* STICKY */
th.sticky, td.sticky{
  position:sticky;
  left:0;
  background:#fff;
  z-index:5;
}
th.sticky2, td.sticky2{
  position:sticky;
  left:160px;
  background:#fff;
  z-index:5;
}

/* NAME */
.nama{min-width:160px;text-align:left;padding-left:6px;}
.jabatan{min-width:120px;text-align:left;padding-left:6px;}

/* MINGGU */
.minggu{
  background:red;
  color:white;
  font-weight:bold;
  writing-mode:vertical-rl;
  transform:rotate(180deg);
}

/* PRINT */
@media print{
  .filter{display:none}
  .table-wrap{overflow:visible}
}
</style>
</head>

<body>

<div class="filter">
  Bulan:
  <select id="bulan" onchange="render()">
    <option value="0">Jan</option><option value="1">Feb</option>
    <option value="2">Mar</option><option value="3">Apr</option>
    <option value="4">Mei</option><option value="5">Jun</option>
    <option value="6">Jul</option><option value="7">Agu</option>
    <option value="8">Sep</option><option value="9">Okt</option>
    <option value="10">Nov</option><option value="11">Des</option>
  </select>

  Tahun:
  <select id="tahun" onchange="render()">
    <option>2025</option>
    <option selected>2026</option>
  </select>

  Nama:
  <select id="filterNama" onchange="render()"></select>

  Jabatan:
  <select id="filterDept" onchange="render()"></select>

  <button onclick="window.print()">Print / PDF</button>
</div>

<div class="table-wrap">
<table>
<thead>
<tr><th class="title" colspan="100">ABSENSI ND</th></tr>
<tr><th class="subtitle" colspan="100" id="periode"></th></tr>

<tr>
  <th class="sticky" rowspan="2">Nama</th>
  <th class="sticky2" rowspan="2">Departemen</th>
  <th id="colTanggal" colspan="31">Tanggal</th>
</tr>
<tr id="headTanggal"></tr>
</thead>

<tbody id="body"></tbody>
</table>
</div>

<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQzl6jOLHAiwYux6qEl-4SfBLWvAiqA5PDEoSLAK6KrqRye_ecMT7o6mTBbCKt41g/pub?gid=30156212&single=true&output=csv";
let rawData = [];

fetch(CSV_URL)
  .then(r => r.text())
  .then(csv => {
    const rows = csv.trim().split("\n");
    const header = rows.shift().split(",");

    rawData = rows.map(r => {
      const c = r.split(",");
      return {
        nama: c[header.indexOf("Nama")],
        dept: c[header.indexOf("Departemen")],
        tanggal: new Date(c[header.indexOf("Tanggal")]),
        jamMasuk: c[header.indexOf("Scan Masuk")] || ""
      };
    });

    initFilter();
    render();
  });

function render() {
  const bulanVal = parseInt(bulan.value);   // 0–11
  const tahunVal = parseInt(tahun.value);
  const namaVal  = filterNama.value;
  const deptVal  = filterDept.value;

  const hariMax = new Date(tahunVal, bulanVal + 1, 0).getDate();

  // 1️⃣ FILTER DATA MENTAH
  const filtered = rawData.filter(r => {
    return (
      r.tanggal.getMonth() === bulanVal &&
      r.tanggal.getFullYear() === tahunVal &&
      (!namaVal || r.nama === namaVal) &&
      (!deptVal || r.dept === deptVal)
    );
  });

  // 2️⃣ GROUP PER ORANG
  const grouped = {};
  filtered.forEach(r => {
    const key = r.nama + "||" + r.dept;
    if (!grouped[key]) {
      grouped[key] = {
        nama: r.nama,
        dept: r.dept,
        hari: {}   // { 1: "07:58", 2: "08:01", ... }
      };
    }
    const tgl = r.tanggal.getDate(); // ✅ INI KUNCI
    grouped[key].hari[tgl] = r.jamMasuk;
  });

  // 3️⃣ RENDER HEADER TANGGAL
  let headerTanggal = "";
  for (let d = 1; d <= hariMax; d++) {
    const day = new Date(tahunVal, bulanVal, d).getDay();
    headerTanggal +=
      day === 0
        ? `<th class="minggu">M</th>`
        : `<th>${d}</th>`;
  }
  headTanggal.innerHTML = headerTanggal;
  colTanggal.colSpan = hariMax;

  // 4️⃣ RENDER BODY
  body.innerHTML = "";
  Object.values(grouped).forEach(emp => {
    let row = `
      <tr>
        <td class="sticky nama">${emp.nama}</td>
        <td class="sticky2 jabatan">${emp.dept}</td>
    `;

    for (let d = 1; d <= hariMax; d++) {
      row += `<td>${emp.hari[d] || ""}</td>`;
    }

    row += "</tr>";
    body.innerHTML += row;
  });
}
</script>

</body>
</html>
``
