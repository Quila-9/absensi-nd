<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi ND</title>

<style>
body{
  font-family: Calibri, Arial, sans-serif;
  margin: 8px;
}

/* FILTER */
.filter{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:10px;
}
select,button{
  padding:5px 8px;
  font-size:13px;
}

/* TABLE WRAP */
.table-wrap{
  width:100%;
  overflow:auto;
  border:1px solid #aaa;
}

/* TABLE */
table{
  border-collapse:collapse;
  min-width:1600px;
  width:100%;
}
th,td{
  border:1px solid #000;
  font-size:11px;
  text-align:center;
  padding:2px;
  height:26px;
}

/* TITLE */
.title{
  background:#f7c600;
  font-size:16px;
  font-weight:bold;
}
.subtitle{
  background:#fff2cc;
  font-weight:bold;
}

/* STICKY */
th.sticky, td.sticky{
  position:sticky;
  left:0;
  background:#fff;
  z-index:5;
}
th.sticky2, td.sticky2{
  position:sticky;
  left:160px;
  background:#fff;
  z-index:5;
}

/* NAME */
.nama{min-width:160px;text-align:left;padding-left:6px;}
.jabatan{min-width:120px;text-align:left;padding-left:6px;}

/* MINGGU */
.minggu{
  background:red;
  color:white;
  font-weight:bold;
  writing-mode:vertical-rl;
  transform:rotate(180deg);
}

/* PRINT */
@media print{
  .filter{display:none}
  .table-wrap{overflow:visible}
}
</style>
</head>

<body>

<div class="filter">
  Bulan:
  <select id="bulan" onchange="render()">
    <option value="0">Jan</option><option value="1">Feb</option>
    <option value="2">Mar</option><option value="3">Apr</option>
    <option value="4">Mei</option><option value="5">Jun</option>
    <option value="6">Jul</option><option value="7">Agu</option>
    <option value="8">Sep</option><option value="9">Okt</option>
    <option value="10">Nov</option><option value="11">Des</option>
  </select>

  Tahun:
  <select id="tahun" onchange="render()">
    <option>2025</option>
    <option selected>2026</option>
  </select>

  Nama:
  <select id="filterNama" onchange="render()"></select>

  Jabatan:
  <select id="filterDept" onchange="render()"></select>

  <button onclick="window.print()">Print / PDF</button>
</div>

<div class="table-wrap">
<table>
<thead>
<tr><th class="title" colspan="100">ABSENSI ND</th></tr>
<tr><th class="subtitle" colspan="100" id="periode"></th></tr>

<tr>
  <th class="sticky" rowspan="2">Nama</th>
  <th class="sticky2" rowspan="2">Departemen</th>
  <th id="colTanggal" colspan="31">Tanggal</th>
</tr>
<tr id="headTanggal"></tr>
</thead>

<tbody id="body"></tbody>
</table>
</div>

<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQzl6jOLHAiwYux6qEl-4SfBLWvAiqA5PDEoSLAK6KrqRye_ecMT7o6mTBbCKt41g/pub?gid=30156212&single=true&output=csv";
let data=[];

fetch(CSV_URL).then(r=>r.text()).then(txt=>{
 const rows=txt.trim().split("\n");
 const h=rows.shift().split(",");

 data=rows.map(r=>{
  const c=r.split(",");
  return{
   nama:c[h.indexOf("Nama")],
   dept:c[h.indexOf("Departemen")],
   tgl:new Date(c[h.indexOf("Tanggal")]),
   jam:c[h.indexOf("Scan Masuk")]
  };
 });
 initFilter();
 render();
});

function initFilter(){
 filterNama.innerHTML="<option value=''>Semua</option>"+
  [...new Set(data.map(d=>d.nama))].map(n=>`<option>${n}</option>`).join("");
 filterDept.innerHTML="<option value=''>Semua</option>"+
  [...new Set(data.map(d=>d.dept))].map(j=>`<option>${j}</option>`).join("");
}

function render(){
 const b=+bulan.value,t=+tahun.value;
 const fn=filterNama.value,fd=filterDept.value;
 const max=new Date(t,b+1,0).getDate();

 periode.textContent=`PERIODE ${bulan.options[b].text.toUpperCase()} ${t}`;

 let ht="";
 for(let i=1;i<=max;i++){
  const d=new Date(t,b,i).getDay();
  ht+=d===0?`<th class="minggu">M</th>`:`<th>${i}</th>`;
 }
 headTanggal.innerHTML=ht;
 colTanggal.colSpan=max;

 const f=data.filter(d=>{
  return d.tgl.getMonth()==b && d.tgl.getFullYear()==t &&
         (!fn||d.nama==fn)&&(!fd||d.dept==fd);
 });

 const g={};
 f.forEach(d=>{
  const k=d.nama+d.dept;
  g[k]??={nama:d.nama,dept:d.dept,harian:{}};
  g[k].harian[d.tgl.getDate()]=d.jam;
 });

 body.innerHTML="";
 Object.values(g).forEach(r=>{
  let tr=`<tr>
   <td class="sticky nama">${r.nama}</td>
   <td class="sticky2 jabatan">${r.dept}</td>`;
  for(let i=1;i<=max;i++){
    tr+=`<td>${r.harian[i]||""}</td>`;
  }
  tr+="</tr>";
  body.innerHTML+=tr;
 });
}
</script>

</body>
</html>
``
