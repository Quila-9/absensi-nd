<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi ND</title>

<style>
:root {
  --yellow:#f7c600;
  --light-yellow:#fff2cc;
  --border:#000;
}

body {
  font-family: Calibri, Arial, sans-serif;
  background: #fff;
  margin: 8px;
}

/* ===== FILTER ===== */
.filter {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  margin-bottom: 8px;
}

select, button {
  font-size: 12px;
  padding: 4px 6px;
}

/* ===== WRAPPER ===== */
.table-container {
  width: 100%;
  overflow: auto;
  border: 1px solid #aaa;
}

/* ===== TABLE ===== */
table {
  border-collapse: collapse;
  min-width: 1400px;
  width: 100%;
  table-layout: fixed;
}

th, td {
  border: 1px solid var(--border);
  font-size: 11px;
  text-align: center;
  padding: 2px;
  height: 24px;
  background: #fff;
}

/* ===== TITLES ===== */
.title {
  background: var(--yellow);
  font-size: 16px;
  font-weight: bold;
}

.subtitle {
  background: var(--light-yellow);
  font-size: 13px;
  font-weight: bold;
}

/* ===== HEADER ===== */
.header {
  background: #f2f2f2;
  font-weight: bold;
}

thead th {
  position: sticky;
  top: 0;
  z-index: 5;
}

/* ===== STICKY LEFT ===== */
.sticky-left {
  position: sticky;
  left: 0;
  z-index: 6;
  background: #fff;
}

.sticky-left-2 {
  position: sticky;
  left: 140px;
  z-index: 6;
  background: #fff;
}

.nama {
  text-align: left;
  padding-left: 6px;
  min-width: 140px;
}

.jabatan {
  text-align: left;
  padding-left: 6px;
  min-width: 110px;
}

/* ===== MINGGU ===== */
.minggu {
  background: #ff0000;
  color: #fff;
  font-weight: bold;
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  width: 18px;
}

/* ===== STATUS ===== */
.h { background: #00ff00; }
.i { background: #ffff00; }
.c { background: #00b0f0; color:#fff; }
.s { background: #ffc000; }
.a { background: #ff0000; color:#fff; }

@media print {
  body { margin:0; }
  .filter { display:none; }
  .table-container { overflow: visible; }
}
</style>
</head>

<body>

<div class="filter">
  Bulan:
  <select id="bulan" onchange="render()">
    <option value="0">Jan</option><option value="1">Feb</option>
    <option value="2">Mar</option><option value="3">Apr</option>
    <option value="4">Mei</option><option value="5" selected>Jun</option>
    <option value="6">Jul</option><option value="7">Agu</option>
    <option value="8">Sep</option><option value="9">Okt</option>
    <option value="10">Nov</option><option value="11">Des</option>
  </select>

  Tahun:
  <select id="tahun" onchange="render()">
    <option>2025</option>
    <option selected>2026</option>
  </select>

  Nama:
  <select id="filterNama" onchange="render()"></select>

  Departemen:
  <select id="filterDept" onchange="render()"></select>

  <button onclick="window.print()">Print / PDF</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
  <th class="title" colspan="100">ABSENSI ND</th>
</tr>
<tr>
  <th class="subtitle" colspan="100" id="periode"></th>
</tr>

<tr class="header">
  <th class="sticky-left" rowspan="2">Nama</th>
  <th class="sticky-left-2" rowspan="2">Departemen</th>
  <th id="colTanggal" colspan="31">Tanggal</th>
  <th rowspan="2">HK</th>
  <th colspan="5">Keterangan</th>
</tr>
<tr class="header" id="headTanggal"></tr>
</thead>

<tbody id="body"></tbody>
</table>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzl6jOLHAiwYux6qEl-4SfBLWvAiqA5PDEoSLAK6KrqRye_ecMT7o6mTBbCKt41g/pub?gid=30156212&single=true&output=csv";
let data=[];

fetch(CSV_URL).then(r=>r.text()).then(txt=>{
 const rows=txt.trim().split("\n");
 const head=rows.shift().split(",");
 data=rows.map(r=>{
  const c=r.split(",");
  return{
   nama:c[head.indexOf("Nama")],
   dept:c[head.indexOf("Departemen")],
   tanggal:c[head.indexOf("Tanggal")],
   status:c[head.indexOf("StatusFinal")]
  };
 });
 initFilter();
 render();
});

function initFilter(){
 filterNama.innerHTML="<option value=''>Semua</option>"+
  [...new Set(data.map(d=>d.nama))].map(n=>`<option>${n}</option>`).join("");
 filterDept.innerHTML="<option value=''>Semua</option>"+
  [...new Set(data.map(d=>d.dept))].map(j=>`<option>${j}</option>`).join("");
}

function render(){
 const b=+bulan.value,t=+tahun.value;
 const fn=filterNama.value,fd=filterDept.value;
 const max=new Date(t,b+1,0).getDate();
 periode.textContent=`PERIODE ${bulan.options[b].text.toUpperCase()} ${t}`;

 let ht="";
 for(let i=1;i<=max;i++){
  const d=new Date(t,b,i).getDay();
  ht+=d===0?`<th class="minggu">M</th>`:`<th>${i}</th>`;
 }
 ht+=`<th class="h">H</th><th class="i">I</th><th class="c">C</th><th class="s">S</th><th class="a">A</th>`;
 headTanggal.innerHTML=ht;
 colTanggal.colSpan=max;

 const f=data.filter(d=>{
  const dt=new Date(d.tanggal);
  return dt.getMonth()==b&&dt.getFullYear()==t&&(!fn||d.nama==fn)&&(!fd||d.dept==fd);
 });

 const g={};
 f.forEach(d=>{
  const k=d.nama+d.dept;
  g[k]??={nama:d.nama,dept:d.dept,harian:{}};
  g[k].harian[new Date(d.tanggal).getDate()]=d.status;
 });

 body.innerHTML="";
 Object.values(g).forEach(r=>{
  let H=0,I=0,C=0,S=0,A=0;
  let tr=`<tr>
   <td class="sticky-left nama">${r.nama}</td>
   <td class="sticky-left-2 jabatan">${r.dept}</td>`;
  for(let i=1;i<=max;i++){
   const s=r.harian[i]||"";
   if(s=="H")H++;if(s=="I")I++;if(s=="C")C++;if(s=="S")S++;if(s=="A")A++;
   tr+=`<td class="${s.toLowerCase()}">${s}</td>`;
  }
  tr+=`<td>${H}</td><td>${H}</td><td>${I}</td><td>${C}</td><td>${S}</td><td>${A}</td></tr>`;
  body.innerHTML+=tr;
 });
}
</script>

</body>
</html>
``
